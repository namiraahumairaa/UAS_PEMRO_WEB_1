<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPI SUDUT - Status Pesanan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.1">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">☕ KOPI SUDUT</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="index.html#coffee">Coffee</a>
                    <a class="nav-link" href="index.html#Non Coffee">Non Coffee</a>
                    <a class="nav-link" href="index.html#breakfast">Breakfast</a>
                    <a class="nav-link" href="index.html#lunch">Lunch</a>
                    <a class="nav-link" href="index.html#dessert">Dessert & Snack</a>
                </div>
                <div class="navbar-nav gap-2 mt-2 mt-lg-0">
                    <a href="status.html" class="btn btn-warning fw-bold">Status Pesanan</a>
                    <a href="cart.html" class="btn btn-outline-light position-relative d-flex align-items-center">
                        🛒 Keranjang
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header py-3 border-bottom text-center">
                        <h4 class="mb-0 fw-bold">Status Pesanan</h4>
                    </div>
                    <div class="card-body p-4 text-center">
                        <div class="alert py-3 mb-4 fw-bold shadow-sm" id="info-status" style="background-color: #e3f2fd; color: #0d47a1;">
                            Menghubungkan ke kasir...
                        </div>

                        <div class="stepper-status mb-4">
                            <div id="step-1" class="stepper-item">
                                <div class="step-counter">1</div>
                                <div class="status-label">Divalidasi</div>
                            </div>
                            <div id="step-2" class="stepper-item">
                                <div class="step-counter">2</div>
                                <div class="status-label">Diproses</div>
                            </div>
                            <div id="step-3" class="stepper-item">
                                <div class="step-counter">3</div>
                                <div class="status-label">Siap Diambil</div>
                            </div>
                        </div>

                        <div class="border rounded p-4 text-start mb-4 shadow-sm bg-white">
                            <h6 class="border-bottom pb-2 fw-bold text-secondary text-uppercase small tracking-wider">Nota Manifes Transaksi</h6>
                            <div id="box-detail-nota" class="small text-muted pt-2">
                                <p class="mb-2 fs-6"><b>ID Pesanan:</b> <span id="nota-id" class="text-dark fw-bold">-</span></p>
                                <p class="mb-2 fs-6"><b>Nama Pelanggan:</b> <span id="nota-nama" class="text-dark">-</span></p>
                                <p class="mb-2 fs-6"><b>Nomor Meja:</b> <span id="nota-meja" class="text-dark fw-bold">-</span></p>
                                <p class="mb-0 fs-6"><b>Catatan:</b> <span id="nota-catatan" class="text-dark">-</span></p>
                            </div>
                        </div>

                        <div class="d-grid">
                            <a href="index.html" class="btn btn-primary btn-lg fw-bold py-2">Kembali Belanja Menu</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="jquery.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript">
        function pantauStatusRiil() {
            $.ajax({
                url: "baca_status.php",
                type: "GET",
                dataType: "json",
                success: function(respon) {
                    if (respon.status_respons === "sukses") {
                        $("#nota-id").text(respon.idPesanan);
                        $("#nota-nama").text(respon.nama_pelanggan);
                        $("#nota-meja").text(respon.meja);
                        $("#nota-catatan").text(respon.catatanPesanan);

                        var step1 = document.getElementById("step-1");
                        var step2 = document.getElementById("step-2");
                        var step3 = document.getElementById("step-3");
                        var info = document.getElementById("info-status");
                        var statusStr = respon.status_pesanan.toLowerCase();

                        step1.className = "stepper-item";
                        step2.className = "stepper-item";
                        step3.className = "stepper-item";

                        if (statusStr === "pending") {
                            step1.className += " active";
                            info.innerText = "Pesanan Anda sudah terkirim. Menunggu validasi kasir...";
                            info.style.backgroundColor = "#e3f2fd";
                            info.style.color = "#0d47a1";
                        } else if (statusStr === "diproses") {
                            step1.className += " completed";
                            step2.className += " active";
                            info.innerText = "Pesanan Anda sedang diproses oleh dapur.";
                            info.style.backgroundColor = "#fff3cd";
                            info.style.color = "#856404";
                        } else if (statusStr === "siap") {
                            step1.className += " completed";
                            step2.className += " completed";
                            step3.className += " completed";
                            info.innerHTML = "Pesanan Selesai! Silakan ambil di meja hidangan.";
                            info.style.backgroundColor = "var(--ks-white)";
                            info.style.color = "var(--ks-caramel)";
                            info.style.border = "2px solid var(--ks-light-brown)";
                        }
                    }
                }
            });
        }

        $(document).ready(function() {
            pantauStatusRiil();
            setInterval(pantauStatusRiil, 2000);
        });
    </script>
</body>
</html>
