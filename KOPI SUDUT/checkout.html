<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPI SUDUT - Checkout</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.1">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">☕ KOPI SUDUT</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="index.html#coffee">Coffee</a>
                    <a class="nav-link" href="index.html#Non Coffee">Non Coffee</a>
                    <a class="nav-link" href="index.html#breakfast">Breakfast</a>
                    <a class="nav-link" href="index.html#lunch">Lunch</a>
                    <a class="nav-link" href="index.html#dessert">Dessert & Snack</a>
                </div>
                <div class="navbar-nav gap-2 mt-2 mt-lg-0">
                    <a href="status.html" class="btn btn-outline-light">Status Pesanan</a>
                    <a href="cart.html" class="btn btn-warning position-relative d-flex align-items-center fw-bold">
                        🛒 Keranjang
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <form id="form-checkout" onsubmit="prosesBayarFinal(event)">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0 p-4">
                        <h3 class="fw-bold mb-4">Informasi Pelanggan</h3>
                        
                        <div class="mb-3">
                            <label for="nama-pelanggan" class="form-label fw-bold">Nama Lengkap</label>
                            <input type="text" id="nama-pelanggan" class="form-control form-control-lg" placeholder="Contoh: Namira Humaira" required>
                        </div>

                        <div class="mb-3">
                            <label for="nomor-meja" class="form-label fw-bold">Nomor Meja</label>
                            <input type="text" id="nomor-meja" class="form-control form-control-lg" placeholder="Masukkan Nomor Meja Anda (Contoh: 05)" required>
                        </div>

                        <div class="mb-3">
                            <label for="catatan-pesanan" class="form-label fw-bold">Catatan Pesanan</label>
                            <textarea id="catatan-pesanan" class="form-control" rows="3" placeholder="Contoh: Kopi/Matcha less sugar, banyakin es" style="resize: none;"></textarea>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card shadow-sm border-0 p-4">
                        <h3 class="fw-bold mb-3 h5">Ringkasan Pembayaran</h3>
                        
                        <div id="daftar-item-checkout" class="mb-3"></div>
                        
                        <hr>
                        
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Subtotal</span>
                            <span id="checkout-subtotal" class="fw-bold">Rp 0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Pajak (10%)</span>
                            <span id="checkout-pajak" class="fw-bold">Rp 0</span>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4 pt-2 border-top">
                            <span class="fw-bold fs-5">Total Bayar</span>
                            <span class="total-price fs-4 fw-bold text-primary" id="checkout-total-akhir">Rp 0</span>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">Konfirmasi Pembayaran</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <div class="modal fade" id="modal-sukses" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center p-4">
                    <div class="fs-1 mb-3">🎉</div>
                    <h3 class="fw-bold text-dark mb-2">Pemesanan Sukses!</h3>
                    <p id="teks-modal-pesan" class="text-muted small mb-4 line-height-md"></p>
                    <button type="button" id="btn-tutup-modal" class="btn btn-success px-4 fw-bold" data-bs-dismiss="modal">Selesai</button>
                </div>
            </div>
        </div>
    </div>

    <script src="jquery.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript">
        var modalInstance;

        function muatRingkasanCheckout() {
            var dataLokal = localStorage.getItem("cartKS");
            var wadahItem = document.getElementById("daftar-item-checkout");
            var wadahSubtotal = document.getElementById("checkout-subtotal");
            var wadahPajak = document.getElementById("checkout-pajak");
            var wadahTotalAkhir = document.getElementById("checkout-total-akhir");

            if (!dataLokal || JSON.parse(dataLokal).length === 0) {
                wadahItem.innerHTML = '<p class="text-muted text-center py-3">Tidak ada pesanan.</p>';
                return;
            }

            var listBelanja = JSON.parse(dataLokal);
            var HTMLItem = "";
            var subtotal = 0;

            listBelanja.forEach(function(barang) {
                var namaValid = barang.nama ? barang.nama : "Menu Pilihan";
                var hargaValid = barang.harga ? barang.harga : 20000;
                
                var totalPerItem = hargaValid * barang.qty;
                subtotal += totalPerItem;

                HTMLItem += '<div class="mb-3 border-bottom pb-2">' +
                    '<div class="d-flex justify-content-between fw-bold text-dark small">' +
                        '<span>' + namaValid + '</span>' +
                        '<span>Rp ' + totalPerItem.toLocaleString('id-ID') + '</span>' +
                    '</div>' +
                    '<div class="text-muted small">Qty: ' + barang.qty + '</div>' +
                '</div>';
            });

            var pajak = subtotal * 0.1;
            var totalAkhir = subtotal + pajak;

            wadahItem.innerHTML = HTMLItem;
            wadahSubtotal.innerText = "Rp " + subtotal.toLocaleString('id-ID');
            wadahPajak.innerText = "Rp " + pajak.toLocaleString('id-ID');
            wadahTotalAkhir.innerText = "Rp " + totalAkhir.toLocaleString('id-ID');
        }

        function prosesBayarFinal(e) {
            e.preventDefault();

            var namaPelanggan = document.getElementById("nama-pelanggan").value.trim();
            var noMeja = document.getElementById("nomor-meja").value.trim();
            var catatan = document.getElementById("catatan-pesanan").value.trim();

            var dataKeranjang = localStorage.getItem("cartKS");
            if (!dataKeranjang || JSON.parse(dataKeranjang).length === 0) {
                alert("Keranjang belanja kosong, gagal memproses pesanan!");
                return;
            }

            var pesananLama = localStorage.getItem("dataPesanan");
            var arrayPesananAdmin = pesananLama ? JSON.parse(pesananLama) : [];

            var notaBaru = {
                idPesanan: "ORD-" + Date.now(),
                namaPelanggan: namaPelanggan,
                meja: noMeja,
                catatanPesanan: catatan ? catatan : "-",
                itemDibelanja: JSON.parse(dataKeranjang),
                status: "Pending" 
            };

            $.ajax({
                url: "proses_pesanan.php",
                type: "POST",
                data: {
                    id_pesanan: notaBaru.idPesanan,
                    nama_pelanggan: notaBaru.namaPelanggan,
                    nomor_meja: notaBaru.meja,
                    catatan: notaBaru.catatanPesanan,
                    items: JSON.stringify(notaBaru.itemDibelanja)
                },
                dataType: "json",
                success: function(respon) {
                    if(respon.status === "sukses") {
                        arrayPesananAdmin.push(notaBaru);
                        localStorage.setItem("dataPesanan", JSON.stringify(arrayPesananAdmin));
                        localStorage.removeItem("cartKS");
                        
                        document.getElementById("teks-modal-pesan").innerText = respon.pesan;
                        modalInstance.show();
                    }
                }
            });
        }

        $(document).ready(function() {
            modalInstance = new bootstrap.Modal(document.getElementById('modal-sukses'));
            muatRingkasanCheckout();

            $("#btn-tutup-modal").on("click", function() {
                window.location.href = "status.html";
            });
        });
    </script>
</body>
</html>
