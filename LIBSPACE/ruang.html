<body class="d-flex flex-column min-vh-100 bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏢 LIBSPACE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Beranda</a>

                    <a class="nav-link active fw-bold" href="status.html">Status</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card p-4 shadow-sm bg-white border">
                    <h5 class="fw-bold mb-3 text-secondary text-center">Daftar Ruang Diskusi Kelompok</h5>
                    <p class="text-muted text-center small mb-4">Silahkan pilih salah satu ruangan yang berstatus kosong di bawah ini</p>
                    
                    <div id="daftar-ruangan" class="row g-3 justify-content-center mb-4"></div>

                    <div class="mb-3 mx-auto w-100" style="max-width: 600px;">
                        <label class="form-label fw-semibold">Keperluan Diskusi Kelompok</label>
                        <textarea id="keperluan" class="form-control" rows="2" placeholder="Contoh: Diskusi tugas kelompok"></textarea>
                    </div>

                    <div class="text-center bg-light p-3 rounded border mx-auto w-100" style="max-width: 600px;">
                        <label class="form-label fw-bold">Ruangan Terpilih:</label>
                        <input type="text" id="ruangan_terpilih" class="form-control text-center fw-bold mb-3 mx-auto" style="max-width: 300px;" readonly placeholder="-">
                        <button id="btn-konfirmasi-ruangan" class="btn btn-success fw-bold px-5">Simpan & Selesaikan Reservasi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
