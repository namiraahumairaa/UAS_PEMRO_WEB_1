<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Meja - Libspace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏢 LIBSPACE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Beranda</a>
                    <a class="nav-link" href="reservasi.html">Reservasi</a>
                    <a class="nav-link active fw-bold" href="status.html">Status</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card p-4 shadow-sm bg-white border">
                    <h4 class="fw-bold mb-4 text-center text-primary">Pilih Meja Kerja Mandiri</h4>
                    
                    <div id="grid-meja" class="mb-4"></div>

                    <div class="d-flex justify-content-center gap-4 border-top pt-3 flex-wrap mb-4">
                        <div class="d-flex align-items-center gap-2">
                            <div class="seat-legend available"></div> <span class="small text-muted">Tersedia</span>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <div class="seat-legend selected-legend"></div> <span class="small text-muted">Pilihan Anda</span>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <div class="seat-legend occupied"></div> <span class="small text-muted">Sudah Terisi</span>
                        </div>
                    </div>

                    <div class="text-center bg-light p-3 rounded border">
                        <label class="form-label fw-bold">Meja Terpilih:</label>
                        <input type="text" id="meja_terpilih" class="form-control text-center fw-bold mb-3 mx-auto" style="max-width: 200px;" readonly placeholder="-">
                        <button id="btn-konfirmasi-meja" class="btn btn-success fw-bold px-5">Simpan & Selesaikan Reservasi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-auto py-4 text-center border-top bg-white" style="border-top: 3px solid #e0c07a !important; background-color: #f9f2e7 !important;">
        <div class="container">
            <p class="mb-1 fw-bold text-primary">© 2026 LIBSPACE - Perpustakaan Universitas</p>
            <p class="small text-muted">Sistem Manajemen Fasilitas Digital untuk Produktivitas Akademik</p>
            <div class="mt-2">
                <a href="https://digilib.ulm.ac.id/archive/" target="_blank" class="text-decoration-none text-secondary fw-bold mx-2">Situs Perpustakaan</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
