<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservasi - Libspace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏢 LIBSPACE</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Beranda</a>
                <a class="nav-link active fw-bold" href="reservasi.html">Reservasi</a>
                <a class="nav-link" href="status.html">Status</a>
            </div>
        </div>
    </nav>

    <div class="container py-4 flex-grow-1">
        <div class="row justify-content-center g-4">
            <div class="col-lg-6 col-md-8">
                <div class="card p-4 shadow-sm">
                    <h5 class="fw-bold mb-3 text-primary text-center">Data Reservasi Fasilitas</h5>
                    <form id="form-reservasi">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nama Lengkap Mahasiswa</label>
                            <input type="text" id="nama" class="form-control" placeholder="Masukkan nama lengkap" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">NIM Mahasiswa</label>
                            <input type="text" id="nim" class="form-control" placeholder="Masukkan NIM (Angka saja)" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tanggal Penggunaan</label>
                            <input type="date" id="tanggal" class="form-control" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Jam Dimulai :</label>
                                <input type="time" id="jam_mulai" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Jam Selesai :</label>
                                <input type="time" id="jam_selesai" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Jenis Layanan</label>
                            <select id="jenis_layanan" class="form-select" required>
                                <option value="">-- Pilih Layanan --</option>
                                <option value="meja">Meja Belajar Mandiri (Quiet Zone)</option>
                                <option value="ruangan">Ruang Diskusi Kelompok</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Lanjutkan Pemilihan Tempat</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-auto py-4 text-center border-top bg-white" style="border-top: 3px solid #e0c07a !important; background-color: #f9f2e7 !important;">
        <div class="container">
            <p class="mb-1 fw-bold text-primary">© 2026 LIBSPACE - Perpustakaan Universitas</p>
            <p class="small text-muted">Sistem Manajemen Fasilitas Digital untuk Produktivitas Akademik</p>
            <div class="mt-2">
                <a href="https://digilib.ulm.ac.id/archive/" target="_blank" class="text-decoration-none text-secondary fw-bold mx-2">Situs Perpustakaan</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
